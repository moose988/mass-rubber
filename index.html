<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rubber Mass Ring Worker Tool</title>
  <style>
    :root{--ink:#172033;--muted:#5c6878;--bg:#f3f6fb;--panel:#fff;--soft:#f8fafc;--line:#d9e2ef;--blue:#1d4ed8;--green:#16803d;--red:#be123c;--amber:#b45309;--shadow:0 14px 34px rgba(15,23,42,.10)}
    *{box-sizing:border-box}
    body{margin:0;font-family:Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45}
    header{background:#182235;color:#fff;padding:24px 18px 78px;text-align:center}
    header h1{margin:0;font-size:clamp(24px,4vw,36px);letter-spacing:0}
    header p{margin:8px auto 0;max-width:760px;color:#d8e2ef}
    main{width:min(1280px,calc(100% - 28px));margin:-54px auto 32px;background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);padding:18px}
    h2{font-size:18px;margin:22px 0 12px;border-bottom:1px solid var(--line);padding-bottom:8px}
    h3{font-size:15px;margin:16px 0 8px}
    label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;color:#344055;margin-bottom:5px}
    input,select,textarea{width:100%;min-height:40px;border:1px solid #cbd5e1;border-radius:8px;padding:9px 10px;font:inherit;background:#fff;color:var(--ink)}
    button{border:0;border-radius:8px;background:var(--blue);color:#fff;font-weight:800;padding:11px 14px;min-height:42px;cursor:pointer}
    button.secondary{background:#334155}
    button.green{background:var(--green)}
    button.danger{background:var(--red)}
    .topbar{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-bottom:14px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;background:var(--soft);border:1px solid #e4ebf3;border-radius:8px;padding:14px}
    .note,.warning,.error{border-radius:8px;padding:12px 14px;margin:12px 0}
    .note{background:#eff6ff;border:1px solid #bfdbfe}
    .warning{background:#fff7ed;border:1px solid #fed7aa;color:#713f12}
    .error{background:#fff1f2;border:1px solid #fecdd3;color:#881337;white-space:pre-wrap}
    .muted{color:var(--muted);font-size:12px}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:8px;background:#fff;margin-top:8px}
    table{border-collapse:collapse;width:100%;min-width:760px;font-size:13px}
    th,td{border-bottom:1px solid var(--line);border-right:1px solid var(--line);padding:8px;text-align:left;vertical-align:top}
    th:last-child,td:last-child{border-right:0}
    th{background:#edf2f7;font-size:11px;text-transform:uppercase}
    td input,td select{min-width:100px}
    .circuit{border:1px solid var(--line);border-radius:8px;padding:14px;margin:14px 0;background:#fff}
    .result-card{border:1px solid #bbf7d0;background:#f0fdf4;border-radius:8px;padding:14px;margin:14px 0}
    .result-card h3{margin-top:0}
    details{border:1px solid #243044;border-radius:8px;background:#0f172a;color:#dce6f3;margin-top:12px}
    summary{cursor:pointer;padding:12px;font-weight:800}
    pre{white-space:pre-wrap;overflow:auto;margin:0;padding:12px;font-size:12px}
    .summary{border:1px solid var(--line);border-radius:8px;padding:14px;background:#f8fafc}
    @media(max-width:720px){main{width:100%;margin:-50px 0 0;border-radius:0;border-left:0;border-right:0}.topbar{grid-template-columns:1fr}.grid{grid-template-columns:1fr}table{min-width:680px}}
  </style>
</head>
<body>
  <header>
    <h1>Rubber Mass Ring Worker Tool</h1>
    <p>Multicircuit route-based calculation for field mass-ring recommendations and engineering records.</p>
  </header>
  <main>
    <div class="topbar" aria-label="Top actions">
      <button id="resetBtn" type="button">Reset Form</button>
      <button id="calculateBtn" type="button" class="green">Calculate Recommendation</button>
      <button id="saveBtn" type="button" class="secondary">Save Unit</button>
    </div>
    <div id="status" class="muted"></div>

    <h2>Unit Information</h2>
    <div class="grid">
      <div><label for="unitNumber">Unit Number</label><input id="unitNumber" autocomplete="off"></div>
      <div><label for="unitModel">Unit Model</label><input id="unitModel" autocomplete="off"><div id="modelNotice" class="muted"></div></div>
      <div><label for="date">Date</label><input id="date" type="date"></div>
      <div><label for="testerName">Tester Name</label><input id="testerName"></div>
      <div><label for="circuitCount">Number of Circuits</label><select id="circuitCount"><option>1</option><option>2</option><option>3</option><option>4</option></select></div>
      <div><label for="savedUnits">Saved Unit Reload</label><select id="savedUnits"><option value="">Select saved unit</option></select><div class="muted">Saved records sync through Firebase when connected.</div></div>
    </div>
    <div id="sameGeometryBox" class="grid" style="margin-top:12px">
      <div>
        <label for="sameGeometry">Do all circuits use the same pipe dimensions and route geometry?</label>
        <select id="sameGeometry"><option value="yes">Yes</option><option value="no">No</option></select>
      </div>
    </div>

    <h2>Model-Based Pipe Data</h2>
    <div class="grid" id="pipePanel"></div>

    <div id="circuitPanels"></div>

    <h2>Worker Output</h2>
    <div id="messages"></div>
    <div id="results"></div>
  </main>

  <script type="module">
    import { createInitialState, adjustCircuitCount, calculateUnit, buildEngineeringRecordText, toMM, isSerialLikeModel, assertNoBadVisibleValues, DIRECTION_OPTIONS } from './src/worker-engine.js';
    import { getCloudPersistenceStatus, getModelPipeData, listUnitRecords, loadUnitRecord, saveModelPipeData, saveUnitRecord, warmCloudPersistence } from './src/cloud-persistence.js';

    let state = createInitialState(1);
    let lastResults = [];
    const $ = id => document.getElementById(id);
    const esc = value => String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
    const num = value => Number.isFinite(Number(value)) ? Number(value) : 0;

    function field(id, label, value, attrs = '') {
      return `<div><label for="${id}">${label}</label><input id="${id}" value="${esc(value)}" ${attrs}></div>`;
    }

    function select(id, label, value, options) {
      return `<div><label for="${id}">${label}</label><select id="${id}">${options.map(o => `<option value="${esc(o.value)}" ${o.value === value ? 'selected' : ''}>${esc(o.label)}</option>`).join('')}</select></div>`;
    }

    async function renderUnit() {
      $('unitNumber').value = state.unit.unitNumber;
      $('unitModel').value = state.unit.unitModel;
      $('date').value = state.unit.date;
      $('testerName').value = state.unit.testerName;
      $('circuitCount').value = state.unit.circuitCount;
      $('sameGeometryBox').style.display = state.unit.circuitCount > 1 ? 'grid' : 'none';
      $('sameGeometry').value = state.sameGeometry;
      $('modelNotice').textContent = '';
      const saved = await listUnitRecords(localStorage);
      $('savedUnits').innerHTML = '<option value="">Select saved unit</option>' + saved.map(r => `<option value="${esc(r.id)}">${esc(r.unitNumber)} / ${esc(r.unitModel)} / ${esc(r.date || '')}</option>`).join('');
    }

    function renderPipe() {
      const p = state.pipe;
      $('pipePanel').innerHTML =
        field('pipe_od', 'Pipe Outside Diameter', p.od, 'type="number" step="any"') +
        select('pipe_odUnit', 'OD Unit', p.odUnit, [{value:'mm',label:'mm'},{value:'inch',label:'inch'}]) +
        field('pipe_thickness', 'Wall Thickness', p.thickness, 'type="number" step="any"') +
        select('pipe_thicknessUnit', 'Thickness Unit', p.thicknessUnit, [{value:'mm',label:'mm'},{value:'inch',label:'inch'}]) +
        field('pipe_material', 'Material', p.material) +
        field('pipe_surfaceTempC', 'Surface Temperature, C', p.surfaceTempC, 'type="number" step="any"') +
        field('pipe_pressure', 'Operating Pressure', p.pressure, 'type="number" step="any"') +
        select('pipe_pressureUnit', 'Pressure Unit', p.pressureUnit, [{value:'psi',label:'psi'},{value:'bar',label:'bar'},{value:'kPa',label:'kPa'}]);
      for (const key of ['od','thickness','material','surfaceTempC','pressure']) $(`pipe_${key}`).addEventListener('input', e => { state.pipe[key] = e.target.value; });
      for (const key of ['odUnit','thicknessUnit','pressureUnit']) $(`pipe_${key}`).addEventListener('change', e => { state.pipe[key] = e.target.value; });
    }

    function routeTable(circuit, ci) {
      return `<div class="table-wrap"><table data-role="route" data-ci="${ci}"><thead><tr><th>Segment Number</th><th>Segment Length</th><th>Unit</th><th>Direction</th><th>Feature at Segment End</th><th>Notes</th><th>Delete</th></tr></thead><tbody>${circuit.route.map((r, ri) => `<tr>
        <td><input data-ci="${ci}" data-ri="${ri}" data-field="number" value="${esc(r.number || ri + 1)}" type="number" step="1"></td>
        <td><input data-ci="${ci}" data-ri="${ri}" data-field="length" value="${esc(r.length)}" type="number" step="any"></td>
        <td><select data-ci="${ci}" data-ri="${ri}" data-field="unit"><option ${r.unit==='mm'?'selected':''}>mm</option><option ${r.unit==='inch'?'selected':''}>inch</option><option ${r.unit==='m'?'selected':''}>m</option></select></td>
        <td><select data-ci="${ci}" data-ri="${ri}" data-field="direction">${DIRECTION_OPTIONS.map(v => `<option ${r.direction===v?'selected':''}>${v}</option>`).join('')}</select></td>
        <td><select data-ci="${ci}" data-ri="${ri}" data-field="feature">${[{v:'none',l:'None'},{v:'bend',l:'Bend'},{v:'braze',l:'Brazed Joint'},{v:'condenser',l:'Condenser/Coil/Header Entrance'},{v:'other',l:'Other No-Place Point'}].map(o => `<option value="${o.v}" ${r.feature===o.v?'selected':''}>${o.l}</option>`).join('')}</select></td>
        <td><input data-ci="${ci}" data-ri="${ri}" data-field="notes" value="${esc(r.notes)}"></td>
        <td><button type="button" class="danger" data-action="delete-route" data-ci="${ci}" data-ri="${ri}">Delete</button></td>
      </tr>`).join('')}</tbody></table></div>`;
    }

    function uTrapTable(circuit, ci) {
      return `<p class="note">The Route Builder defines the complete pipe. The U-Trap Builder identifies which route segments form the U-trap and its internal braze.</p><div class="table-wrap"><table><thead><tr><th>Segment 1</th><th>Segment 2</th><th>Segment 3</th><th>Start distance along total discharge line</th><th>Piece 1 length</th><th>Piece 2 length</th><th>Piece 3 length</th><th>Units</th><th>Braze location</th><th>Custom offset</th><th>Delete</th></tr></thead><tbody>${(circuit.uTraps || []).map((u, ui) => {
        const segs = u.segments || ['', '', ''];
        return `<tr>
        <td><input data-ci="${ci}" data-ui="${ui}" data-u-seg="0" value="${esc(segs[0] || '')}" type="number" step="1"></td>
        <td><input data-ci="${ci}" data-ui="${ui}" data-u-seg="1" value="${esc(segs[1] || '')}" type="number" step="1"></td>
        <td><input data-ci="${ci}" data-ui="${ui}" data-u-seg="2" value="${esc(segs[2] || '')}" type="number" step="1"></td>
        <td><input data-ci="${ci}" data-ui="${ui}" data-u="start" value="${esc(u.start)}" type="number" step="any"></td>
        <td><input data-ci="${ci}" data-ui="${ui}" data-u="p1" value="${esc(u.p1)}" type="number" step="any"></td>
        <td><input data-ci="${ci}" data-ui="${ui}" data-u="p2" value="${esc(u.p2)}" type="number" step="any"></td>
        <td><input data-ci="${ci}" data-ui="${ui}" data-u="p3" value="${esc(u.p3)}" type="number" step="any"></td>
        <td><select data-ci="${ci}" data-ui="${ui}" data-u="unit"><option ${u.unit==='mm'?'selected':''}>mm</option><option ${u.unit==='inch'?'selected':''}>inch</option><option ${u.unit==='m'?'selected':''}>m</option></select></td>
        <td><select data-ci="${ci}" data-ui="${ui}" data-u="braze">${[{v:'none',l:'None'},{v:'p1mid',l:'Middle of Piece 1'},{v:'p2mid',l:'Middle of Piece 2'},{v:'p3mid',l:'Middle of Piece 3'},{v:'custom',l:'Custom offset'}].map(o => `<option value="${o.v}" ${u.braze===o.v?'selected':''}>${o.l}</option>`).join('')}</select></td>
        <td><input data-ci="${ci}" data-ui="${ui}" data-u="customBrazeOffset" value="${esc(u.customBrazeOffset || '')}" type="number" step="any"></td>
        <td><button type="button" class="danger" data-action="delete-utrap" data-ci="${ci}" data-ui="${ui}">Delete</button></td>
      </tr>`;
      }).join('')}</tbody></table></div>`;
    }

    function measurementTable(circuit, ci) {
      const names = ['Near compressor','Previous recommended position','Old support position','First U-trap braze','Near final bend','Final braze','Custom'];
      const conditions = ['Unsupported baseline','Support only','Rings only','Rings and support','Other trial'];
      return `<div class="table-wrap"><table><thead><tr><th>Condition</th><th>Measurement Name</th><th>Actual Sensor Distance</th><th>Distance Unit</th><th>Vertical Vrms, mm/s</th><th>Horizontal/Axial Vrms, mm/s</th><th>Governing Velocity</th><th>Two-axis Resultant</th><th>Calculated Classification</th><th>Delete</th></tr></thead><tbody>${(circuit.measurements || []).map((m, mi) => `<tr>
        <td><select data-ci="${ci}" data-mi="${mi}" data-m="condition">${conditions.map(v => `<option ${m.condition===v?'selected':''}>${v}</option>`).join('')}</select></td>
        <td><select data-ci="${ci}" data-mi="${mi}" data-m="name">${names.map(v => `<option ${m.name===v?'selected':''}>${v}</option>`).join('')}</select></td>
        <td><input data-ci="${ci}" data-mi="${mi}" data-m="distance" value="${esc(m.distance)}" type="number" step="any"></td>
        <td><select data-ci="${ci}" data-mi="${mi}" data-m="unit"><option ${m.unit==='mm'?'selected':''}>mm</option><option ${m.unit==='inch'?'selected':''}>inch</option><option ${m.unit==='m'?'selected':''}>m</option></select></td>
        <td><input data-ci="${ci}" data-mi="${mi}" data-m="vertical" value="${esc(m.vertical)}" type="number" step="any"></td>
        <td><input data-ci="${ci}" data-mi="${mi}" data-m="horizontal" value="${esc(m.horizontal)}" type="number" step="any"></td>
        <td>${esc(Math.max(num(m.vertical), num(m.horizontal)).toFixed(2))}</td>
        <td>${esc(Math.sqrt(num(m.vertical) ** 2 + num(m.horizontal) ** 2).toFixed(2))}</td>
        <td>${esc(m.classification || 'Calculated after run')}</td>
        <td><button type="button" class="danger" data-action="delete-measurement" data-ci="${ci}" data-mi="${mi}">Delete</button></td>
      </tr>`).join('')}</tbody></table></div>`;
    }

    function renderCircuit(circuit, ci) {
      const o = circuit.operating;
      const routeTotal = circuit.route.reduce((s, r) => s + (Number.isFinite(toMM(r.length, r.unit)) ? toMM(r.length, r.unit) : 0), 0);
      return `<section class="circuit" id="circuit-${ci + 1}">
        <h2>Circuit ${ci + 1}</h2>
        <h3>Route Builder</h3>
        ${routeTable(circuit, ci)}
        <div class="actions"><button type="button" data-action="add-route" data-ci="${ci}">Add Segment</button><button type="button" class="secondary" data-action="remove-route" data-ci="${ci}">Remove Last Segment</button><button type="button" class="secondary" data-action="calc-route" data-ci="${ci}">Calculate Route Length</button></div>
        <div class="grid"><div><label>Manual Total Verification</label><input data-ci="${ci}" data-op="manualTotal" value="${esc(circuit.manualTotal)}" type="number" step="any"></div><div><label>Manual Total Unit</label><select data-ci="${ci}" data-op="manualTotalUnit"><option ${circuit.manualTotalUnit==='mm'?'selected':''}>mm</option><option ${circuit.manualTotalUnit==='inch'?'selected':''}>inch</option><option ${circuit.manualTotalUnit==='m'?'selected':''}>m</option></select></div><div><label>Calculated Route Length</label><input readonly value="${routeTotal.toFixed(2)} mm"></div></div>
        <h3>Multiple U-Traps</h3>
        ${uTrapTable(circuit, ci)}
        <div class="actions"><button type="button" data-action="add-utrap" data-ci="${ci}">Add U-Trap</button></div>
        <h3>Measurement Inputs</h3>
        <div class="grid">
          ${field(`op_${ci}_speed`, 'Compressor Speed', o.speed, 'type="number" step="any" data-ci="'+ci+'" data-o="speed"')}
          ${select(`op_${ci}_speedUnit`, 'Speed Unit', o.speedUnit, [{value:'RPM',label:'RPM'},{value:'Hz',label:'Hz'}]).replace('<select', `<select data-ci="${ci}" data-o="speedUnit"`)}
          ${select(`op_${ci}_speedType`, 'Fixed Speed or Variable Speed', o.speedType, [{value:'fixed',label:'Fixed Speed'},{value:'variable',label:'Variable Speed'}]).replace('<select', `<select data-ci="${ci}" data-o="speedType"`)}
          ${field(`op_${ci}_minSpeed`, 'Minimum Speed when variable', o.minSpeed, 'type="number" step="any" data-ci="'+ci+'" data-o="minSpeed"')}
          ${field(`op_${ci}_maxSpeed`, 'Maximum Speed when variable', o.maxSpeed, 'type="number" step="any" data-ci="'+ci+'" data-o="maxSpeed"')}
          ${field(`op_${ci}_measuredNaturalHz`, 'Measured Natural Frequency, Hz', o.measuredNaturalHz, 'type="number" step="any" data-ci="'+ci+'" data-o="measuredNaturalHz"')}
          ${field(`op_${ci}_operatingDominantHz`, 'Operating Dominant Frequency, Hz', o.operatingDominantHz, 'type="number" step="any" data-ci="'+ci+'" data-o="operatingDominantHz"')}
          ${field(`op_${ci}_peakVelocity`, 'Peak Velocity, mm/s', o.peakVelocity, 'type="number" step="any" data-ci="'+ci+'" data-o="peakVelocity"')}
          ${field(`op_${ci}_maxDisplacement`, 'Maximum Displacement', o.maxDisplacement, 'type="number" step="any" data-ci="'+ci+'" data-o="maxDisplacement"')}
          ${select(`op_${ci}_displacementUnit`, 'Displacement Unit', o.displacementUnit, [{value:'mm',label:'mm'},{value:'um',label:'um'}]).replace('<select', `<select data-ci="${ci}" data-o="displacementUnit"`)}
          ${field(`op_${ci}_highestLocationName`, 'Highest Vibration Location', o.highestLocationName, 'data-ci="'+ci+'" data-o="highestLocationName"')}
          ${field(`op_${ci}_highestLocationDistance`, 'Distance of Highest Vibration Location', o.highestLocationDistance, 'type="number" step="any" data-ci="'+ci+'" data-o="highestLocationDistance"')}
          ${select(`op_${ci}_highestLocationUnit`, 'Highest Location Unit', o.highestLocationUnit, [{value:'mm',label:'mm'},{value:'inch',label:'inch'},{value:'m',label:'m'}]).replace('<select', `<select data-ci="${ci}" data-o="highestLocationUnit"`)}
        </div>
        <h3>Critical Measurement Table</h3>
        ${measurementTable(circuit, ci)}
        <div class="actions"><button type="button" data-action="add-measurement" data-ci="${ci}">Add Measurement Row</button></div>
      </section>`;
    }

    function renderMeasurementCircuit(circuit, ci) {
      const o = circuit.operating;
      return `<section class="circuit" id="circuit-${ci + 1}">
        <h2>Circuit ${ci + 1}</h2>
        <h3>Measurement Inputs</h3>
        <div class="grid">
          ${field(`op_${ci}_speed`, 'Compressor Speed', o.speed, 'type="number" step="any" data-ci="'+ci+'" data-o="speed"')}
          ${select(`op_${ci}_speedUnit`, 'Speed Unit', o.speedUnit, [{value:'RPM',label:'RPM'},{value:'Hz',label:'Hz'}]).replace('<select', `<select data-ci="${ci}" data-o="speedUnit"`)}
          ${select(`op_${ci}_speedType`, 'Fixed Speed or Variable Speed', o.speedType, [{value:'fixed',label:'Fixed Speed'},{value:'variable',label:'Variable Speed'}]).replace('<select', `<select data-ci="${ci}" data-o="speedType"`)}
          ${field(`op_${ci}_minSpeed`, 'Minimum Speed when variable', o.minSpeed, 'type="number" step="any" data-ci="'+ci+'" data-o="minSpeed"')}
          ${field(`op_${ci}_maxSpeed`, 'Maximum Speed when variable', o.maxSpeed, 'type="number" step="any" data-ci="'+ci+'" data-o="maxSpeed"')}
          ${field(`op_${ci}_measuredNaturalHz`, 'Measured Natural Frequency, Hz', o.measuredNaturalHz, 'type="number" step="any" data-ci="'+ci+'" data-o="measuredNaturalHz"')}
          ${field(`op_${ci}_operatingDominantHz`, 'Operating Dominant Frequency, Hz', o.operatingDominantHz, 'type="number" step="any" data-ci="'+ci+'" data-o="operatingDominantHz"')}
          ${field(`op_${ci}_peakVelocity`, 'Peak Velocity, mm/s', o.peakVelocity, 'type="number" step="any" data-ci="'+ci+'" data-o="peakVelocity"')}
          ${field(`op_${ci}_maxDisplacement`, 'Maximum Displacement', o.maxDisplacement, 'type="number" step="any" data-ci="'+ci+'" data-o="maxDisplacement"')}
          ${select(`op_${ci}_displacementUnit`, 'Displacement Unit', o.displacementUnit, [{value:'mm',label:'mm'},{value:'um',label:'um'}]).replace('<select', `<select data-ci="${ci}" data-o="displacementUnit"`)}
          ${field(`op_${ci}_highestLocationName`, 'Highest Vibration Location', o.highestLocationName, 'data-ci="'+ci+'" data-o="highestLocationName"')}
          ${field(`op_${ci}_highestLocationDistance`, 'Distance of Highest Vibration Location', o.highestLocationDistance, 'type="number" step="any" data-ci="'+ci+'" data-o="highestLocationDistance"')}
          ${select(`op_${ci}_highestLocationUnit`, 'Highest Location Unit', o.highestLocationUnit, [{value:'mm',label:'mm'},{value:'inch',label:'inch'},{value:'m',label:'m'}]).replace('<select', `<select data-ci="${ci}" data-o="highestLocationUnit"`)}
        </div>
        <h3>Critical Measurement Table</h3>
        ${measurementTable(circuit, ci)}
        <div class="actions"><button type="button" data-action="add-measurement" data-ci="${ci}">Add Measurement Row</button></div>
      </section>`;
    }

    function renderCircuits() {
      if (state.sameGeometry === 'yes' && state.unit.circuitCount > 1) {
        $('circuitPanels').innerHTML = renderCircuit(state.circuits[0], 0) + '<div class="note">Pipe dimensions and route geometry are entered once and copied into each calculation. Measurements remain independent per circuit.</div>' + state.circuits.slice(1).map((c, i) => renderMeasurementCircuit(c, i + 1)).join('');
      } else {
        $('circuitPanels').innerHTML = state.circuits.map((c, i) => renderCircuit(c, i)).join('');
      }
    }

    async function renderAll() {
      await renderUnit();
      renderPipe();
      renderCircuits();
      bindDynamic();
    }

    function bindDynamic() {
      document.querySelectorAll('[data-field]').forEach(el => el.addEventListener('input', e => {
        const c = state.circuits[+e.target.dataset.ci];
        c.route[+e.target.dataset.ri][e.target.dataset.field] = e.target.value;
      }));
      document.querySelectorAll('[data-u]').forEach(el => el.addEventListener('input', e => {
        state.circuits[+e.target.dataset.ci].uTraps[+e.target.dataset.ui][e.target.dataset.u] = e.target.value;
      }));
      document.querySelectorAll('[data-u-seg]').forEach(el => el.addEventListener('input', e => {
        const trap = state.circuits[+e.target.dataset.ci].uTraps[+e.target.dataset.ui];
        trap.segments = trap.segments || ['', '', ''];
        trap.segments[+e.target.dataset.uSeg] = e.target.value;
      }));
      document.querySelectorAll('[data-m]').forEach(el => el.addEventListener('input', e => {
        state.circuits[+e.target.dataset.ci].measurements[+e.target.dataset.mi][e.target.dataset.m] = e.target.value;
      }));
      document.querySelectorAll('[data-o]').forEach(el => el.addEventListener('input', e => {
        state.circuits[+e.target.dataset.ci].operating[e.target.dataset.o] = e.target.value;
      }));
      document.querySelectorAll('[data-op]').forEach(el => el.addEventListener('input', e => {
        state.circuits[+e.target.dataset.ci][e.target.dataset.op] = e.target.value;
      }));
      document.querySelectorAll('[data-action]').forEach(btn => btn.addEventListener('click', e => {
        const action = e.target.dataset.action;
        const ci = +e.target.dataset.ci;
        const c = state.circuits[ci];
        if (action === 'add-route') c.route.push({ number: c.route.length + 1, length: '', unit: 'mm', direction: 'Right', feature: 'none', notes: '' });
        if (action === 'remove-route' && c.route.length > 1) c.route.pop();
        if (action === 'delete-route' && c.route.length > 1) c.route.splice(+e.target.dataset.ri, 1);
        if (action === 'calc-route') alert(`Route length: ${c.route.reduce((s, r) => s + (Number.isFinite(toMM(r.length, r.unit)) ? toMM(r.length, r.unit) : 0), 0).toFixed(2)} mm`);
        if (action === 'add-utrap') c.uTraps.push({ segments: ['', '', ''], start: '', p1: '', p2: '', p3: '', unit: 'mm', braze: 'p1mid', customBrazeOffset: '' });
        if (action === 'delete-utrap') c.uTraps.splice(+e.target.dataset.ui, 1);
        if (action === 'add-measurement') c.measurements.push({ condition: 'Unsupported baseline', name: 'Custom', distance: '', unit: 'mm', vertical: '', horizontal: '' });
        if (action === 'delete-measurement') c.measurements.splice(+e.target.dataset.mi, 1);
        renderAll();
      }));
    }

    function resultHtml(result) {
      const l = result.selectedLayout;
      const rings = l.rings.map(r => `<li>Circuit ${result.circuitIndex + 1} - Ring ${r.ring}: Install ${r.massG.toFixed(0)} g at ${r.x.toFixed(1)} mm from the compressor on Segment ${r.section.segment}.<br>Direction/orientation: ${esc(r.section.direction)}<br>Ring axial width: ${r.widthMM.toFixed(1)} mm<br>Nearest feature: ${esc(r.nearbyFeature)}<br>Clearance from nearest bend: ${Number.isFinite(r.bendClearanceMM) ? r.bendClearanceMM.toFixed(1) : 'not applicable'} mm<br>Clearance from nearest braze: ${Number.isFinite(r.brazeClearanceMM) ? r.brazeClearanceMM.toFixed(1) : 'not applicable'} mm</li>`).join('');
      return `<article class="result-card">
        <h3>${esc(result.title)}</h3>
        ${result.mismatchWarning ? `<div class="warning">${result.mismatchWarning}</div>` : ''}
        ${result.brazeWarning ? `<div class="warning">${result.brazeWarning}</div>` : ''}
        <ul>${rings}</ul>
        <p><strong>Total added mass:</strong> ${(l.totalPhysicalMassKg * 1000).toFixed(1)} g<br>
        <strong>Effective modal added mass:</strong> ${(l.effectiveModalMassKg * 1000).toFixed(1)} g<br>
        <strong>Measured natural frequency:</strong> ${result.currentRisk ? result.record.raw.circuit.operating.measuredNaturalHz : ''} Hz<br>
        <strong>Predicted natural frequency after rings:</strong> ${l.predictedNaturalHz.toFixed(2)} Hz<br>
        <strong>Nearest harmonic:</strong> ${l.nearestHarmonic.order}X ${l.nearestHarmonic.bandHz ? l.nearestHarmonic.bandHz.map(v => v.toFixed(2)).join('-') : l.nearestHarmonic.frequencyHz.toFixed(2)} Hz<br>
        <strong>Current resonance risk:</strong> ${result.currentRisk.risk}<br>
        <strong>Predicted after-layout resonance risk:</strong> ${l.resonanceRisk}<br>
        <strong>Static stress:</strong> ${(l.staticResult.stressPa / 1e6).toFixed(2)} MPa<br>
        <strong>Allowable stress:</strong> ${(l.staticResult.allowablePa / 1e6).toFixed(2)} MPa<br>
        <strong>Static deflection:</strong> ${(l.staticResult.deflectionM * 1000).toFixed(3)} mm<br>
        <strong>Deflection limit:</strong> ${(l.staticResult.limitM * 1000).toFixed(3)} mm<br>
        <strong>Static check:</strong> PASS<br>
        <strong>Pressure screening status:</strong> ${esc(l.pressureResult.status)}<br>
        <strong>Dynamic/fatigue screening status:</strong> ${esc(l.dynamicStatus)}<br>
        <strong>Worst current braze Vmax:</strong> ${result.worstBrazeVmax.toFixed(2)} mm/s<br>
        <strong>Braze target:</strong> below 5 mm/s<br>
        <strong>Field verification required:</strong> Yes</p>
        <p>${result.requiredFinalText}</p>
        <p>${esc(result.pressureNotice)}</p>
        <details><summary>Full Engineering Record</summary><pre>${esc(buildEngineeringRecordText(result))}</pre></details>
      </article>`;
    }

    function calculate() {
      $('messages').innerHTML = '';
      const out = calculateUnit(state);
      lastResults = out.results;
      if (out.errors.length) {
        $('messages').innerHTML = `<div class="error">Fix these inputs first:\n- ${out.errors.map(esc).join('\n- ')}</div>`;
        $('results').innerHTML = '';
        return;
      }
      state = out.state;
      const summary = state.unit.circuitCount > 1 ? `<div class="summary"><h3>Unit Recommendation Summary</h3>${out.results.map(r => `<p>Circuit ${r.circuitIndex + 1}: ${r.selectedLayout.rings.map(x => `Ring ${x.ring}: ${x.massG.toFixed(0)} g at ${x.x.toFixed(0)} mm`).join('; ')}</p>`).join('')}</div>` : '';
      const html = summary + out.results.map(resultHtml).join('');
      $('results').innerHTML = assertNoBadVisibleValues(html) ? html : '<div class="error">A calculated value is non-finite. Calculation blocked.</div>';
      renderAll();
    }

    $('resetBtn').addEventListener('click', () => { state = createInitialState(1); lastResults = []; $('results').innerHTML = ''; $('messages').innerHTML = ''; renderAll(); });
    $('calculateBtn').addEventListener('click', calculate);
    $('saveBtn').addEventListener('click', async () => {
      const out = calculateUnit(state);
      if (out.errors.length) { $('messages').innerHTML = `<div class="error">Fix these inputs first:\n- ${out.errors.map(esc).join('\n- ')}</div>`; return; }
      $('status').textContent = 'Saving unit...';
      const saved = await saveUnitRecord(localStorage, out.state, out.results, id => confirm(`Replace saved data for ${id}?`));
      $('status').textContent = saved.saved
        ? saved.cloudSaved
          ? `Saved unit ${saved.record.unitNumber} / ${saved.record.unitModel} to Firebase.`
          : `Saved unit ${saved.record.unitNumber} / ${saved.record.unitModel} on this device. ${saved.cloudReason || 'Firebase is not configured.'}`
        : saved.reason;
      renderAll();
    });
    $('unitNumber').addEventListener('input', e => { state.unit.unitNumber = e.target.value; });
    $('unitModel').addEventListener('input', async e => {
      state.unit.unitModel = e.target.value;
      $('modelNotice').textContent = isSerialLikeModel(e.target.value) ? 'This looks like a serial identifier, not a model number.' : '';
      const saved = await getModelPipeData(localStorage, e.target.value);
      if (saved && confirm(`Saved pipe data exists for ${e.target.value}. Load it now?`)) { state.pipe = saved; renderAll(); }
    });
    $('date').addEventListener('input', e => { state.unit.date = e.target.value; });
    $('testerName').addEventListener('input', e => { state.unit.testerName = e.target.value; });
    $('circuitCount').addEventListener('change', e => { state = adjustCircuitCount(state, e.target.value); renderAll(); });
    $('sameGeometry').addEventListener('change', e => { state.sameGeometry = e.target.value; renderAll(); });
    $('savedUnits').addEventListener('change', async e => {
      const record = await loadUnitRecord(localStorage, e.target.value);
      if (!record) return;
      state = { schemaVersion: record.schemaVersion, unit: record.unit, sameGeometry: record.sameGeometry, pipe: record.modelPipeData, circuits: record.circuits };
      lastResults = record.recommendations || [];
      $('status').textContent = `Loaded saved unit ${record.unitNumber} / ${record.unitModel}.`;
      renderAll();
    });
    window.addEventListener('beforeunload', () => {
      if (state.unit.unitModel && !isSerialLikeModel(state.unit.unitModel)) saveModelPipeData(localStorage, state.unit.unitModel, state.pipe, () => false);
    });
    renderAll();
    warmCloudPersistence().then(status => {
      if (!$('status').textContent && status.enabled) $('status').textContent = 'Firebase sync connected.';
      if (!$('status').textContent && !status.enabled) $('status').textContent = getCloudPersistenceStatus().reason;
      renderAll();
    });
  </script>
</body>
</html>
